<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in COMUSCS</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial; text-align:center; padding:20px; }

.dashboard-grid {
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:10px;
}

.dashboard-card {
    border:1px solid #ccc;
    padding:10px;
    border-radius:8px;
    background:#f9f9f9;
}

.dashboard-card strong {
    font-size:22px;
    display:block;
}

#reader { width:300px; margin:auto; }
button { padding:10px; margin:5px; }

.ok { color:green; }
.erro { color:red; }
.aviso { color:orange; }

table {
    width:100%;
    margin-top:10px;
    border-collapse: collapse;
}

td, th {
    border:1px solid #ccc;
    padding:6px;
}
</style>
</head>

<body>

<h2>Check-in COMUSCS</h2>

<select id="eventoSelect" onchange="trocarEvento()"></select>

<br>

<button id="btnCamera" onclick="toggleCamera()">Ativar câmera</button>
<button id="btnTrocarCamera" onclick="trocarCamera()" style="display:none;">Alternar câmera</button>

<div id="reader"></div>

<div id="resultado"></div>

<div class="dashboard">
<h3>Resumo do evento</h3>

<div class="dashboard-grid">
<div class="dashboard-card"><span>Inscritos</span><strong id="dashboardInscritos">0</strong></div>
<div class="dashboard-card"><span>Presenças</span><strong id="dashboardPresencas">0</strong></div>
<div class="dashboard-card"><span>Pendentes</span><strong id="dashboardPendentes">0</strong></div>
<div class="dashboard-card"><span>Fora</span><strong id="dashboardFora">0</strong></div>
</div>

<button onclick="verInscritos()">Ver inscritos</button>
</div>

<hr>

<h3>Presenças</h3>
<table>
<thead><tr><th>Nome</th><th>Nº</th><th>Hora</th></tr></thead>
<tbody id="listaPresencas"></tbody>
</table>

<h3>Movimentações</h3>
<table>
<thead><tr><th>Nome</th><th>Nº</th><th>Movimento</th><th>Hora</th></tr></thead>
<tbody id="listaMovimentacoes"></tbody>
</table>

<hr>

<input type="file" id="csvInput">
<button onclick="importarCSV()">Importar CSV</button>

<button onclick="exportarExcel()">Exportar Presenças</button>
<button onclick="exportarMov()">Exportar Movimentações</button>

<script>

const SUPABASE_URL = "SUA_URL";
const SUPABASE_KEY = "SUA_KEY";

let EVENTO_ID = "";
let html5QrCode = null;
let cameraAtiva = false;
let cameras = [];
let camIndex = 0;

function headers(extra={}) {
    return {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        ...extra
    }
}

async function toggleCamera(){
    if(!cameraAtiva){
        html5QrCode = new Html5Qrcode("reader");
        cameras = await Html5Qrcode.getCameras();
        await startCam();
        cameraAtiva=true;
    } else {
        await html5QrCode.stop();
        cameraAtiva=false;
    }
}

async function startCam(){
    await html5QrCode.start(
        cameras[camIndex].id,
        {fps:10,qrbox:250},
        msg=>registrar(msg)
    );
}

async function trocarCamera(){
    if(cameras.length<2) return;
    await html5QrCode.stop();
    camIndex = (camIndex+1)%cameras.length;
    await startCam();
}

async function registrar(code){
    let num = code.trim();

    let r = await fetch(`${SUPABASE_URL}/rest/v1/inscritos?numero_inscricao=eq.${num}&select=id,nome`,{headers:headers()});
    let data = await r.json();

    if(!data.length){
        resultado("Não encontrado","erro"); return;
    }

    let pessoa = data[0];

    let pres = await fetch(`${SUPABASE_URL}/rest/v1/presencas?inscrito_id=eq.${pessoa.id}`,{headers:headers()});
    let presData = await pres.json();

    if(!presData.length){
        await fetch(`${SUPABASE_URL}/rest/v1/presencas`,{
            method:"POST",
            headers:headers({"Content-Type":"application/json"}),
            body:JSON.stringify({evento_id:EVENTO_ID,inscrito_id:pessoa.id,numero_inscricao:num})
        });

        await mov(pessoa,"entrada");
        resultado("Entrada registrada","ok");

    } else {

        let ult = await fetch(`${SUPABASE_URL}/rest/v1/movimentacoes_presenca?inscrito_id=eq.${pessoa.id}&order=horario.desc&limit=1`,{headers:headers()});
        let ultData = await ult.json();

        if(!ultData.length || ultData[0].tipo_movimento==="saida"){
            if(confirm("Registrar retorno?")){
                await mov(pessoa,"retorno");
                resultado("Retorno","ok");
            }
        } else {
            if(confirm("Registrar saída?")){
                await mov(pessoa,"saida");
                resultado("Saída","ok");
            }
        }
    }

    atualizarDashboard();
}

async function mov(pessoa,tipo){
    await fetch(`${SUPABASE_URL}/rest/v1/movimentacoes_presenca`,{
        method:"POST",
        headers:headers({"Content-Type":"application/json"}),
        body:JSON.stringify({
            evento_id:EVENTO_ID,
            inscrito_id:pessoa.id,
            numero_inscricao:pessoa.numero_inscricao,
            tipo_movimento:tipo
        })
    });
}

function resultado(msg,tipo){
    document.getElementById("resultado").innerHTML=`<span class="${tipo}">${msg}</span>`;
}

async function atualizarDashboard(){

    let ins = await fetch(`${SUPABASE_URL}/rest/v1/inscritos?evento_id=eq.${EVENTO_ID}`,{headers:headers()});
    let pres = await fetch(`${SUPABASE_URL}/rest/v1/presencas?evento_id=eq.${EVENTO_ID}`,{headers:headers()});
    let mov = await fetch(`${SUPABASE_URL}/rest/v1/movimentacoes_presenca?evento_id=eq.${EVENTO_ID}`,{headers:headers()});

    let insD = await ins.json();
    let presD = await pres.json();
    let movD = await mov.json();

    let ult = {};
    movD.forEach(m=>ult[m.inscrito_id]=m.tipo_movimento);

    let fora = Object.values(ult).filter(x=>x==="saida").length;

    document.getElementById("dashboardInscritos").innerText=insD.length;
    document.getElementById("dashboardPresencas").innerText=presD.length;
    document.getElementById("dashboardPendentes").innerText=insD.length-presD.length;
    document.getElementById("dashboardFora").innerText=fora;
}

async function importarCSV(){

    let file = document.getElementById("csvInput").files[0];

    Papa.parse(file,{
        header:true,
        delimiter:";",
        complete: async function(res){

            let payload = res.data.map(r=>({
                evento_id:EVENTO_ID,
                nome:r["Nome"],
                numero_inscricao:r["Número de Inscrição"]
            })).filter(x=>x.numero_inscricao);

            await fetch(`${SUPABASE_URL}/rest/v1/inscritos?on_conflict=evento_id,numero_inscricao`,{
                method:"POST",
                headers:headers({"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"}),
                body:JSON.stringify(payload)
            });

            atualizarDashboard();
        }
    });
}

async function exportarExcel(){
    let res = await fetch(`${SUPABASE_URL}/rest/v1/presencas?select=numero_inscricao,inscritos(nome)`,{headers:headers()});
    let d = await res.json();

    let ws = XLSX.utils.json_to_sheet(d.map(x=>({
        Nome:x.inscritos.nome,
        Inscricao:x.numero_inscricao
    })));

    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Presencas");
    XLSX.writeFile(wb,"presencas.xlsx");
}

async function exportarMov(){
    let res = await fetch(`${SUPABASE_URL}/rest/v1/movimentacoes_presenca?select=numero_inscricao,tipo_movimento`,{headers:headers()});
    let d = await res.json();

    let ws = XLSX.utils.json_to_sheet(d);

    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Mov");
    XLSX.writeFile(wb,"movimentacoes.xlsx");
}

</script>

</body>
</html>
