<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in COMUSCS</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial; text-align:center; margin:0; padding:20px;}
#reader { width:300px; margin:auto; }
button, select, input { padding:10px; margin:6px; }

.dashboard {
    border:1px solid #ccc;
    padding:15px;
    border-radius:10px;
    margin:15px 0;
}

.admin-box {
    border:1px solid #ccc;
    padding:15px;
    margin-top:15px;
    border-radius:8px;
}

.ok { color:green; font-weight:bold; }
.erro { color:red; font-weight:bold; }
</style>
</head>

<body>

<h2>Check-in COMUSCS</h2>

<label>Evento:</label>
<select id="eventoSelect" onchange="trocarEvento()"></select>

<!-- DASHBOARD -->
<div class="dashboard">
    <h3>📊 Resumo do evento</h3>
    <p>Inscritos: <span id="totalInscritos">0</span></p>
    <p>Presenças: <span id="totalPresencas">0</span></p>
    <p>Pendentes: <span id="totalPendentes">0</span></p>

    <button onclick="verInscritos()">Ver inscritos</button>
</div>

<button id="btnCamera" onclick="toggleCamera()">Ativar câmera</button>

<div id="reader"></div>

<div id="resultado"></div>

<hr>

<table border="1" width="100%">
<thead>
<tr>
<th>Nome</th>
<th>Nº</th>
<th>Hora</th>
</tr>
</thead>
<tbody id="listaPresencas"></tbody>
</table>

<hr>

<button onclick="abrirAdmin()">Área admin</button>

<div id="adminArea" style="display:none;" class="admin-box">

<button onclick="fecharAdmin()">Fechar admin</button>

<h4>Criar evento</h4>
<input id="novoEventoNome">
<input id="novoEventoData" type="date">
<button onclick="criarEvento()">Criar</button>

<hr>

<input type="file" id="csvInput">
<button onclick="importarCSV()">Importar CSV</button>

<hr>

<button onclick="exportarExcel()">Exportar Excel</button>

<hr>

<button onclick="limparEventoAtual()">Limpar evento</button>
<button onclick="resetCompleto()">RESET COMPLETO</button>

</div>

<script>

const SUPABASE_URL = "https://goytizsanwooamfjtvqk.supabase.co";
const SUPABASE_KEY = "SUA_KEY_AQUI";

let EVENTO_ID = "";
let EVENTO_NOME = "";
let html5QrCode = null;
let cameraAtiva = false;

function headers(extra={}) {
    return {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        ...extra
    }
}
function abrirAdmin(){
    document.getElementById("adminArea").style.display="block";
}
function fecharAdmin(){
    document.getElementById("adminArea").style.display="none";
}

async function carregarEventos(){
    const res = await fetch(`${SUPABASE_URL}/rest/v1/eventos?select=id,nome`);
    const eventos = await res.json();

    const select = document.getElementById("eventoSelect");
    select.innerHTML="";

    eventos.forEach(ev=>{
        const op=document.createElement("option");
        op.value=ev.id;
        op.textContent=ev.nome;
        op.dataset.nome=ev.nome;
        select.appendChild(op);
    });

    EVENTO_ID = select.value;
    EVENTO_NOME = select.options[0]?.dataset.nome;

    atualizarDashboard();
}

function trocarEvento(){
    const select=document.getElementById("eventoSelect");
    EVENTO_ID=select.value;
    EVENTO_NOME=select.options[select.selectedIndex].dataset.nome;
    atualizarDashboard();
}

async function atualizarDashboard(){
    if(!EVENTO_ID) return;

    const r1 = await fetch(`${SUPABASE_URL}/rest/v1/inscritos?evento_id=eq.${EVENTO_ID}&select=id`, {headers:headers()});
    const inscritos = await r1.json();

    const r2 = await fetch(`${SUPABASE_URL}/rest/v1/presencas?evento_id=eq.${EVENTO_ID}&select=id`, {headers:headers()});
    const presencas = await r2.json();

    document.getElementById("totalInscritos").innerText = inscritos.length;
    document.getElementById("totalPresencas").innerText = presencas.length;
    document.getElementById("totalPendentes").innerText = inscritos.length - presencas.length;

    carregarPresencas();
}

async function verInscritos(){
    const res = await fetch(`${SUPABASE_URL}/rest/v1/inscritos?evento_id=eq.${EVENTO_ID}&select=nome,numero_inscricao`);
    const data = await res.json();

    let txt="INSCRITOS:\n\n";
    data.forEach(i=>{
        txt += `${i.nome} - ${i.numero_inscricao}\n`;
    });

    alert(txt);
}

async function registrarPresenca(code){

    const r = await fetch(`${SUPABASE_URL}/rest/v1/inscritos?evento_id=eq.${EVENTO_ID}&numero_inscricao=eq.${code}&select=id,nome,numero_inscricao`);
    const data = await r.json();

    if(!data.length){
        alert("Não encontrado");
        return;
    }

    const pessoa = data[0];

    await fetch(`${SUPABASE_URL}/rest/v1/presencas`, {
        method:"POST",
        headers:headers({"Content-Type":"application/json"}),
        body: JSON.stringify({
            evento_id:EVENTO_ID,
            inscrito_id:pessoa.id,
            numero_inscricao:pessoa.numero_inscricao
        })
    });

    atualizarDashboard();
}

async function carregarPresencas(){
    const res = await fetch(`${SUPABASE_URL}/rest/v1/presencas?evento_id=eq.${EVENTO_ID}&select=numero_inscricao,horario_checkin,inscritos(nome)`, {headers:headers()});
    const data = await res.json();

    const tbody = document.getElementById("listaPresencas");
    tbody.innerHTML="";

    data.forEach(p=>{
        const tr=document.createElement("tr");
        tr.innerHTML = `
        <td>${p.inscritos?.nome||""}</td>
        <td>${p.numero_inscricao}</td>
        <td>${new Date(p.horario_checkin).toLocaleTimeString()}</td>`;
        tbody.appendChild(tr);
    });
}

async function toggleCamera(){
    if(!cameraAtiva){
        html5QrCode = new Html5Qrcode("reader");
        const cams = await Html5Qrcode.getCameras();
        await html5QrCode.start(
            cams[0].id,
            {fps:10,qrbox:250},
            code=>registrarPresenca(code)
        );
        cameraAtiva=true;
    } else {
        await html5QrCode.stop();
        cameraAtiva=false;
    }
}

async function importarCSV(){
    const file=document.getElementById("csvInput").files[0];

    Papa.parse(file,{
        header:true,
        delimiter:";",
        complete: async function(res){

            const rows=res.data;

            const payload = rows.map(r=>({
                evento_id:EVENTO_ID,
                nome:r["Nome"],
                numero_inscricao:r["Número de Inscrição"]
            })).filter(p=>p.nome && p.numero_inscricao);

            await fetch(`${SUPABASE_URL}/rest/v1/inscritos?on_conflict=evento_id,numero_inscricao`,{
                method:"POST",
                headers:headers({"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"}),
                body:JSON.stringify(payload)
            });

            atualizarDashboard();
        }
    });
}

async function exportarExcel(){
    const res = await fetch(`${SUPABASE_URL}/rest/v1/presencas?evento_id=eq.${EVENTO_ID}&select=numero_inscricao,horario_checkin,inscritos(nome)`, {headers:headers()});
    const data = await res.json();

    const linhas = data.map(p=>({
        Nome:p.inscritos?.nome,
        Inscricao:p.numero_inscricao,
        Hora:new Date(p.horario_checkin).toLocaleString()
    }));

    const ws=XLSX.utils.json_to_sheet(linhas);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Presencas");
    XLSX.writeFile(wb,"presencas.xlsx");
}

async function limparEventoAtual(){
    await fetch(`${SUPABASE_URL}/rest/v1/presencas?evento_id=eq.${EVENTO_ID}`,{method:"DELETE",headers:headers()});
    await fetch(`${SUPABASE_URL}/rest/v1/inscritos?evento_id=eq.${EVENTO_ID}`,{method:"DELETE",headers:headers()});
    atualizarDashboard();
}

async function resetCompleto(){
    await fetch(`${SUPABASE_URL}/rest/v1/presencas?id=not.is.null`,{method:"DELETE",headers:headers()});
    await fetch(`${SUPABASE_URL}/rest/v1/inscritos?id=not.is.null`,{method:"DELETE",headers:headers()});
    await fetch(`${SUPABASE_URL}/rest/v1/eventos?id=not.is.null`,{method:"DELETE",headers:headers()});
    carregarEventos();
}

carregarEventos();
setInterval(atualizarDashboard,5000);

</script>

</body>
</html>
